spring.application.name=IOT_service
server.port=8082

# PostgreSQL
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://postgres:5432/sensordb}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate ? ddl-auto=update will auto-create the new columns/tables
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Auth service URL (mainservice) ? used by JwtAuthFilter to validate tokens
# Docker: http://mainservice:8080  |  local: http://localhost:8080
auth.service.url=${AUTH_SERVICE_URL:http://mainservice:8080}

# Kafka ? disabled
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

# Eureka
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka}

# Actuator + Prometheus
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}

# Logging
logging.level.com.example.IOT_service=DEBUG
logging.level.org.springframework.web=INFO
