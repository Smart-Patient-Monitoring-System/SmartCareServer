name: CD - Deploy to Azure Container Apps

on:
  workflow_run:
    workflows: ["CD - Build & Push Images (GHCR)"]
    types:
      - completed

env:
  REGISTRY: ghcr.io
  RESOURCE_GROUP: your-resource-group
  CONTAINERAPPS_ENVIRONMENT: your-containerapps-environment

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: read

    strategy:
      matrix:
        include:
          - service: discoveryserver
            app_name: discoveryserver
          - service: apigateway
            app_name: apigateway
          - service: mainservice
            app_name: mainservice
          - service: iot-service
            app_name: iot-service
          - service: chatbotbackend
            app_name: chatbotbackend
          - service: vitalreports
            app_name: vitalreports

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image namespace
        id: ns
        run: echo "ns=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Compute SHA tag
        id: vars
        run: echo "sha_tag=sha-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update Container App image
        run: |
          az containerapp update \
            --name ${{ matrix.app_name }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/${{ steps.ns.outputs.ns }}/${{ matrix.service }}:${{ steps.vars.outputs.sha_tag }}